# Copy this file to quenginedev/quenginedev as:
#   .github/workflows/generate-snake.yml
#
# Then: Actions tab → "Generate Snake" → Run workflow (once).
# The snake SVG will appear in README after the output branch is created.

name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: quenginedev
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=2bbc8a&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=2bbc8a

      - name: Publish snake to output branch
        uses: orhun/git-publish-action@v2
        with:
          file_dir: dist
          branch: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
